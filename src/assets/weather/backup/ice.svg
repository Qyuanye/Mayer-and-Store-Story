<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <g fill="#ffffff" opacity="0.6">
        <rect x="8" y="-10" width="3" height="3">
            <animate attributeName="y" from="-10" to="70" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="x" values="8;10;6;8" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="16" y="-20" width="2" height="2">
            <animate attributeName="y" from="-20" to="70" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="x" values="16;18;14;16" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="26" y="-5" width="3" height="3">
            <animate attributeName="y" from="-5" to="70" dur="3.5s" repeatCount="indefinite"/>
            <animate attributeName="x" values="26;28;24;26" dur="3.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="34" y="-25" width="2" height="2">
            <animate attributeName="y" from="-25" to="70" dur="4.5s" repeatCount="indefinite"/>
            <animate attributeName="x" values="34;36;32;34" dur="4.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="42" y="-15" width="3" height="3">
            <animate attributeName="y" from="-15" to="70" dur="3.8s" repeatCount="indefinite"/>
            <animate attributeName="x" values="42;44;40;42" dur="3.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="50" y="-30" width="2" height="2">
            <animate attributeName="y" from="-30" to="70" dur="4.2s" repeatCount="indefinite"/>
            <animate attributeName="x" values="50;52;48;50" dur="4.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="58" y="-8" width="3" height="3">
            <animate attributeName="y" from="-8" to="70" dur="3.2s" repeatCount="indefinite"/>
            <animate attributeName="x" values="58;60;56;58" dur="3.2s" repeatCount="indefinite"/>
        </rect>
    </g>
</svg>