<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <g opacity="0.35" fill="#3498db">
        <rect x="8"  y="-10" width="2" height="6">
            <animate attributeName="y" from="-10" to="70" dur="1.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="16" y="-20" width="2" height="6">
            <animate attributeName="y" from="-20" to="70" dur="1.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="24" y="-5" width="2" height="6">
            <animate attributeName="y" from="-5" to="70" dur="1.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="32" y="-25" width="2" height="6">
            <animate attributeName="y" from="-25" to="70" dur="1.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="40" y="-15" width="2" height="6">
            <animate attributeName="y" from="-15" to="70" dur="1.3s" repeatCount="indefinite"/>
        </rect>
        <rect x="48" y="-30" width="2" height="6">
            <animate attributeName="y" from="-30" to="70" dur="1.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="56" y="-8" width="2" height="6">
            <animate attributeName="y" from="-8" to="70" dur="1.2s" repeatCount="indefinite"/>
        </rect>
    </g>
    <polygon points="30,20 36,20 32,30 38,30 28,48 30,34 26,34"
             fill="#f1c40f"
             opacity="0">
        <animate attributeName="opacity"
                 values="0;0;1;0.2;0;0"
                 keyTimes="0;0.6;0.65;0.7;0.75;1"
                 dur="3s"
                 repeatCount="indefinite"/>
    </polygon>
</svg>